<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sa Hub</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#0d0d0d;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
margin:0;
}

.card{
background:#141414;
padding:35px;
border-radius:18px;
width:340px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
text-align:center;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#1d1d1d;
color:white;
font-size:15px;
margin-bottom:20px;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2b2b2b;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#3c3c3c;
}

.icon{
margin-right:8px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">Sa Hub v1</div>

<select id="platform">

<option value="ios"> iOS</option>

<option value="windows">🪟 Windows</option>

<option value="mac">🍎 macOS</option>

<option value="android">🤖 Android</option>

</select>

<button id="downloadBtn">
<i class="fa-solid fa-download icon"></i>
Download for iOS
</button>

</div>

<script>

const select = document.getElementById("platform");
const btn = document.getElementById("downloadBtn");

const links = {

ios:"itms-services://?action=download-manifest&url=https://ronixstudios.io/manifest.plist",

windows:"https://wearedevs.net/d/Ronix",

mac:"https://wearedevs.net/d/Ronix",

android:"https://wearedevs.net/d/Ronix"

};

function updateButton(){

let platform = select.value;

btn.innerHTML = `<i class="fa-solid fa-download icon"></i> Download for ${select.options[select.selectedIndex].text}`;

btn.onclick = () => {

window.location.href = links[platform];

};

}

select.addEventListener("change",updateButton);

updateButton();

/* منع النسخ */

document.addEventListener("copy",e=>e.preventDefault());

document.addEventListener("contextmenu",e=>e.preventDefault());

document.onselectstart=()=>false;

/* تعطيل أدوات المطور */

document.onkeydown=function(e){

if(

e.keyCode==123 ||

(e.ctrlKey&&e.shiftKey&&e.keyCode==73) ||

(e.ctrlKey&&e.keyCode==85)

){

return false;

}

};

</script>

</body>
</html>
